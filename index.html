<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
/>

<title>BreathSync v0.16</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family:
      system-ui,
      -apple-system,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
    color: white;
    touch-action: manipulation;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #ui-layer {
    position: fixed;
    inset: 0;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;

    padding: 2rem 1rem;

    pointer-events: none;

    z-index: 10;
  }

  #version-badge {
    position: fixed;

    top: 10px;
    left: 10px;

    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);

    color: #aaa;

    font-size: 0.7rem;

    padding: 0.25rem 0.7rem;

    border-radius: 1rem;

    z-index: 20;
  }

  #permission-box {
    background: rgba(26,26,46,0.9);

    backdrop-filter: blur(12px);

    border-radius: 1.5rem;

    padding: 2rem;

    text-align: center;

    max-width: 320px;

    pointer-events: auto;

    box-shadow:
      0 20px 40px rgba(0,0,0,0.5);
  }

  #permission-box p {
    color: #ccc;
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }

  button {
    border: none;

    background: #6c63ff;

    color: white;

    font-weight: 600;

    font-size: 1rem;

    padding: 0.8rem 2rem;

    border-radius: 999px;

    cursor: pointer;

    pointer-events: auto;

    box-shadow:
      0 10px 20px rgba(108,99,255,0.3);
  }

  button:active {
    background: #5a52e0;
  }

  button:disabled {
    opacity: 0.5;
  }

  #main-ui {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  #hint-motion {
    display: none;

    background: rgba(0,0,0,0.6);

    backdrop-filter: blur(8px);

    color: #ffb347;

    padding: 0.8rem 1.5rem;

    border-radius: 999px;
  }

  #phase-indicator {
    font-size: 3rem;
    font-weight: 700;

    text-transform: uppercase;

    letter-spacing: 0.2em;

    text-shadow:
      0 0 20px rgba(108,99,255,0.5);

    background: rgba(0,0,0,0.3);

    backdrop-filter: blur(10px);

    padding: 0.5rem 2rem;

    border-radius: 999px;
  }

  .hidden {
    display: none !important;
  }
</style>
</head>

<body>

<div id="version-badge">v0.16</div>

<canvas id="breathCanvas"></canvas>

<div id="ui-layer">

  <div id="permission-box" class="hidden">

    <p id="perm-message">
      Разрешите доступ к датчикам движения
    </p>

    <button id="enable-motion-btn">
      Разрешить
    </button>

  </div>

  <div id="main-ui" class="hidden">

    <div id="hint-motion">
      Положите телефон вертикально на диафрагму
    </div>

    <button id="startBtn">
      Старт
    </button>

    <div id="phase-indicator">
      Вдох
    </div>

  </div>

</div>

<script>
(function () {

  // --------------------------------------------------
  // DOM
  // --------------------------------------------------

  const canvas =
    document.getElementById("breathCanvas");

  const ctx =
    canvas.getContext("2d");

  const permissionBox =
    document.getElementById("permission-box");

  const enableMotionBtn =
    document.getElementById("enable-motion-btn");

  const mainUI =
    document.getElementById("main-ui");

  const startBtn =
    document.getElementById("startBtn");

  const hintMotion =
    document.getElementById("hint-motion");

  const phaseEl =
    document.getElementById("phase-indicator");

  const permMessage =
    document.getElementById("perm-message");

  // --------------------------------------------------
  // STATE
  // --------------------------------------------------

  let running = false;
  let motionEnabled = false;

  let sessionStartSec = 0;
  let sessionTime = 0;

  let lastMotionTime = 0;

  let logicalWidth = window.innerWidth;
  let logicalHeight = window.innerHeight;

  // --------------------------------------------------
  // SIGNAL
  // --------------------------------------------------

  let filteredBreath = 0;

  // Медленный baseline
  let baseline = 0;

  // Автомасштаб
  let scaleSmoothed = 1.0;

  const absHistory = [];

  const AMP_WINDOW_MS = 1400;

  // Буфер графика
  const dataBuffer = [];

  const VISIBLE_DURATION = 20;

  // --------------------------------------------------
  // RESIZE
  // --------------------------------------------------

  function resizeCanvas() {

    const dpr =
      window.devicePixelRatio || 1;

    logicalWidth =
      window.innerWidth;

    logicalHeight =
      window.innerHeight;

    canvas.width =
      logicalWidth * dpr;

    canvas.height =
      logicalHeight * dpr;

    ctx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );
  }

  window.addEventListener(
    "resize",
    resizeCanvas
  );

  resizeCanvas();

  // --------------------------------------------------
  // MOTION
  // --------------------------------------------------

  function handleMotion(event) {

    const g =
      event.accelerationIncludingGravity;

    if (!g || g.z == null) return;

    if (!running) return;

    const nowMs =
      performance.now();

    const nowSec =
      nowMs / 1000;

    lastMotionTime = nowMs;

    // --------------------------------------------------
    // NORMALIZED GRAVITY
    // --------------------------------------------------

    const gLen = Math.sqrt(
      g.x * g.x +
      g.y * g.y +
      g.z * g.z
    );

    if (gLen < 0.001) return;

  // --------------------------------------------------
  // TILT SIGNAL
  // --------------------------------------------------
  
  // Берём комбинированный tilt
  // намного чувствительнее чем чистый z
  let raw =
    (
      // g.z * 0.8 +
      // g.y * 0.2
      g.y
      
    ) / gLen;
  
  // --------------------------------------------------
  // REMOVE DC
  // --------------------------------------------------
  
  // baseline теперь намного медленнее
  // чтобы не съедать дыхание
  
  baseline =
    0.999 * baseline +
    0.001 * raw;
  
  raw =
    raw - baseline;
  
  // --------------------------------------------------
  // SMALL DEADZONE
  // --------------------------------------------------
  
  const DEADZONE = 0.0008;
  
  if (Math.abs(raw) < DEADZONE) {
    raw = 0;
  }
  
  // --------------------------------------------------
  // LIGHT CLAMP
  // --------------------------------------------------
  
  raw = Math.max(
    -0.2,
    Math.min(0.2, raw)
  );
  
  // --------------------------------------------------
  // FASTER EMA
  // --------------------------------------------------
  
  filteredBreath =
    0.18 * raw +
    0.82 * filteredBreath;
    
    // --------------------------------------------------
    // AUTO SCALE
    // --------------------------------------------------

    const absVal =
      Math.abs(filteredBreath);

    absHistory.push({
      time: nowMs,
      abs: absVal
    });

    while (
      absHistory.length &&
      nowMs - absHistory[0].time >
      AMP_WINDOW_MS
    ) {
      absHistory.shift();
    }

    let maxAbs = 0.003;

    for (const s of absHistory) {
      if (s.abs > maxAbs) {
        maxAbs = s.abs;
      }
    }

    const targetScale =
  Math.min(
    40,
    Math.max(
      6,
      0.08 / maxAbs
    )
  );

scaleSmoothed =
  0.94 * scaleSmoothed +
  0.06 * targetScale;

    // --------------------------------------------------
    // BUFFER
    // --------------------------------------------------

    const relativeTime =
      nowSec - sessionStartSec;

    dataBuffer.push({
      time: relativeTime,
      value: filteredBreath
    });

    while (
      dataBuffer.length &&
      relativeTime -
      dataBuffer[0].time >
      VISIBLE_DURATION
    ) {
      dataBuffer.shift();
    }
  }

  function startMotionListener() {

    window.addEventListener(
      "devicemotion",
      handleMotion
    );

    motionEnabled = true;
  }

  // --------------------------------------------------
  // PERMISSION
  // --------------------------------------------------

  function requestMotionPermission() {

    if (
      typeof DeviceMotionEvent
        .requestPermission ===
      "function"
    ) {

      DeviceMotionEvent
        .requestPermission()
        .then(state => {

          if (state === "granted") {

            enableMotion();

          } else {

            permMessage.textContent =
              "Доступ к датчикам запрещён";

            enableMotionBtn.disabled = true;
          }
        })
        .catch(console.error);

    } else {

      enableMotion();
    }
  }

  function enableMotion() {

    permissionBox.classList.add(
      "hidden"
    );

    mainUI.classList.remove(
      "hidden"
    );

    startMotionListener();
  }

  if (window.DeviceMotionEvent) {

    if (
      typeof DeviceMotionEvent
        .requestPermission ===
      "function"
    ) {

      permissionBox.classList.remove(
        "hidden"
      );

      enableMotionBtn.addEventListener(
        "click",
        requestMotionPermission
      );

    } else {

      enableMotion();
    }

  } else {

    permissionBox.classList.remove(
      "hidden"
    );

    permMessage.textContent =
      "Датчики движения не поддерживаются";

    enableMotionBtn.disabled = true;
  }

  // --------------------------------------------------
  // START / STOP
  // --------------------------------------------------

  function toggleRunning() {

    if (!motionEnabled) {

      alert(
        "Разрешите доступ к датчикам"
      );

      return;
    }

    if (!running) {

      dataBuffer.length = 0;
      absHistory.length = 0;

      filteredBreath = 0;
      baseline = 0;
      scaleSmoothed = 1.0;

      sessionStartSec =
        performance.now() / 1000;

      sessionTime = 0;

      running = true;

      startBtn.textContent = "Стоп";

      hintMotion.style.display = "none";

    } else {

      running = false;

      startBtn.textContent = "Старт";
    }
  }

  startBtn.addEventListener(
    "click",
    toggleRunning
  );

  // --------------------------------------------------
  // DRAW
  // --------------------------------------------------

  function drawCanvas(currentTimeSec) {

    const w = logicalWidth;
    const h = logicalHeight;

    ctx.clearRect(0, 0, w, h);

    const graphTop = 20;
    const graphBottom = h - 20;

    const graphHeight =
      graphBottom - graphTop;

    const midY =
      (graphTop + graphBottom) / 2;

    const refAmplitude =
      graphHeight * 0.42;

    const pxPerSec =
      w / VISIBLE_DURATION;

    // --------------------------------------------------
    // REFERENCE
    // --------------------------------------------------

    ctx.beginPath();

    ctx.strokeStyle = "#6c63ff";
    ctx.lineWidth = 1.8;

    let first = true;

    for (
      let t =
        currentTimeSec -
        VISIBLE_DURATION;

      t <= currentTimeSec;

      t += 0.016
    ) {

      const x =
        (
          t -
          (
            currentTimeSec -
            VISIBLE_DURATION
          )
        ) * pxPerSec;

      const y =
        midY -
        Math.sin(
          2 *
          Math.PI *
          0.1 *
          t
        ) * refAmplitude;

      if (first) {

        ctx.moveTo(x, y);

        first = false;

      } else {

        ctx.lineTo(x, y);
      }
    }

    ctx.stroke();

    // --------------------------------------------------
    // BREATH SIGNAL
    // --------------------------------------------------

    if (dataBuffer.length > 1) {

      ctx.beginPath();

      ctx.strokeStyle = "#00ff88";
      ctx.lineWidth = 2.8;

      const visibleStart =
        currentTimeSec -
        VISIBLE_DURATION;

      let started = false;

      for (const pt of dataBuffer) {

        if (
          pt.time < visibleStart ||
          pt.time > currentTimeSec
        ) {
          continue;
        }

        const x =
          (
            pt.time -
            visibleStart
          ) * pxPerSec;

        const y =
          midY -
          (
            pt.value *
            scaleSmoothed
          ) * refAmplitude;

        if (!started) {

          ctx.moveTo(x, y);

          started = true;

        } else {

          ctx.lineTo(x, y);
        }
      }

      ctx.stroke();
    }

    // --------------------------------------------------
    // CENTER LINE
    // --------------------------------------------------

    ctx.beginPath();

    ctx.strokeStyle =
      "rgba(255,255,255,0.08)";

    ctx.lineWidth = 0.5;

    ctx.moveTo(0, midY);
    ctx.lineTo(w, midY);

    ctx.stroke();
  }

  // --------------------------------------------------
  // LOOP
  // --------------------------------------------------

  function animationLoop() {

    requestAnimationFrame(
      animationLoop
    );

    if (running) {

      const nowSec =
        performance.now() / 1000;

      sessionTime =
        nowSec - sessionStartSec;

      const derivative =
        Math.cos(
          2 *
          Math.PI *
          0.1 *
          sessionTime
        );

      phaseEl.textContent =
        derivative > 0
          ? "Вдох"
          : "Выдох";

      const timeSinceMotion =
        performance.now() -
        lastMotionTime;

      hintMotion.style.display =
        (
          timeSinceMotion > 2000 &&
          !document.hidden
        )
          ? "block"
          : "none";
    }

    drawCanvas(sessionTime);
  }

  requestAnimationFrame(
    animationLoop
  );

})();
</script>

</body>
</html>
